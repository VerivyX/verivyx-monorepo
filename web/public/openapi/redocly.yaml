# Lint config for the Verivyx OpenAPI specs.
# `minimal` enforces real OpenAPI 3.1 structural correctness without the
# documentation-completeness style nags (license, per-tag descriptions, etc.)
# that don't apply to these internal-authored specs.
extends:
  - minimal
rules:
  # Catch genuinely broken references and undefined security schemes.
  no-unresolved-refs: error
  security-defined: error
  no-invalid-media-type-examples: warn
