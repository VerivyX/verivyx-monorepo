openapi: 3.1.0
info:
  title: Verivyx WordPress Plugin REST
  version: "1.5"
  description: |
    **Internal reference.** REST routes the Verivyx paywall plugin exposes on a
    creator's WordPress site (`<site>/wp-json/verivyx/v1/*`). These are called
    server-to-server by Verivyx, not by public clients.

    - `GET /content` — returns the real article body; called by the hydration
      service with the per-site `X-Verivyx-Internal` token.
    - `GET /confirm` — part of the "Connect to Verivyx" handshake; called by
      auth-service to read back the ownership nonce.
servers:
  - url: https://your-wordpress-site.example
    description: A creator's WordPress site (replace host)
tags:
  - name: plugin
    description: Verivyx paywall plugin REST routes
paths:
  /wp-json/verivyx/v1/content:
    get:
      operationId: wpGetContent
      tags: [plugin]
      summary: Get the real article body (internal)
      description: Renders the post/page body bypassing the withholding filter. Requires the per-site internal token.
      security:
        - wpInternalToken: []
      parameters:
        - name: slug
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The rendered HTML body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  html: { type: string }
        "401":
          description: Missing/wrong X-Verivyx-Internal token (or plugin not connected).
          content:
            application/json: { schema: { $ref: "#/components/schemas/Error" } }
        "404":
          description: Post/page not found for the slug.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: not_found }

  /wp-json/verivyx/v1/confirm:
    get:
      operationId: wpConfirm
      tags: [plugin]
      summary: Return the connect ownership nonce (handshake)
      description: Called by auth-service during connect/authorize to verify domain ownership. Returns the nonce, never the secret token.
      security: []
      parameters:
        - name: connect_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The one-time ownership nonce.
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce: { type: string }
        "404":
          description: Unknown connect_id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: unknown }
components:
  securitySchemes:
    wpInternalToken:
      type: apiKey
      in: header
      name: X-Verivyx-Internal
      description: Per-site internal token provisioned by the Connect handshake.
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
